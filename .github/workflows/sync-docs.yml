# OpenClaw Docs Sync - GitHub Actions Workflow
# 自动从主仓库同步文档，构建 Skill 包，发布 Release

name: Sync and Build Docs

on:
  # 1. 定时同步：每天 UTC 02:00 运行（北京时间 10:00）
  schedule:
    - cron: '0 2 * * *'
  
  # 2. 手动触发
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（忽略缓存）'
        required: false
        default: false
        type: boolean
      skip_release:
        description: '跳过发布 Release'
        required: false
        default: false
        type: boolean
  
  # 3. 监听上游仓库的 repository_dispatch 事件
  repository_dispatch:
    types: [docs-updated]

  # 4. push 时触发（用于测试）
  push:
    branches: [main]

env:
  UPSTREAM_REPO: https://github.com/openclaw/openclaw.git
  DOCS_BRANCH: main
  PYTHON_VERSION: '3.11'

jobs:
  # Job: 构建文档和 Skill 包
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check upstream changes
        id: check
        run: |
          set -e
          
          # 克隆上游仓库
          git clone --depth 1 ${{ env.UPSTREAM_REPO }} upstream-temp
          
          cd upstream-temp
          UPSTREAM_SHA=$(git rev-parse HEAD)
          UPSTREAM_DATE=$(git log -1 --format=%cd --date=iso)
          cd ..
          
          echo "upstream_sha=${UPSTREAM_SHA}" >> $GITHUB_OUTPUT
          echo "upstream_date=${UPSTREAM_DATE}" >> $GITHUB_OUTPUT
          
          # 检查上次同步状态
          if [ -f .last-sync-commit ]; then
            LAST_SYNC=$(cat .last-sync-commit)
          else
            LAST_SYNC="none"
          fi
          
          # 判断是否需要更新
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "🔄 强制重新构建"
          elif [ "$LAST_SYNC" = "$UPSTREAM_SHA" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "📦 文档已是最新，无需同步"
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "🔄 发现更新，需要同步"
            echo "上次: $LAST_SYNC"
            echo "本次: $UPSTREAM_SHA"
          fi

      - name: Clone docs
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          rm -rf docs-cache
          mkdir -p docs-cache
          
          # 使用 sparse checkout 只拉取 docs/
          git clone --depth 1 --filter=blob:none --sparse \
            ${{ env.UPSTREAM_REPO }} docs-temp
          
          cd docs-temp
          git sparse-checkout set docs
          
          # 移动 docs 内容
          if [ -d "docs" ]; then
            mv docs/* ../docs-cache/
          fi
          cd ..
          rm -rf docs-temp
          
          echo "📁 docs-cache 内容:"
          ls -la docs-cache/

      - name: Filter non-English docs
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          cd docs-cache
          
          # 移除多语言目录
          for lang in zh-CN ja-JP ko-KR de-DE fr-FR es-ES; do
            if [ -d "$lang" ]; then
              echo "🗑️  移除: $lang/"
              rm -rf "$lang"
            fi
          done
          
          # 移除 i18n 目录
          if [ -d ".i18n" ]; then
            rm -rf ".i18n"
          fi
          
          # 统计
          echo "📊 过滤后的文档统计:"
          find . -name "*.md" | wc -l
          cd ..

      - name: Clean documentation
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          python scripts/clean-docs.py docs-cache

      - name: Generate index
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          python scripts/build-index.py --docs-path docs-cache
          
          if [ ! -f "docs-index.json" ]; then
            echo "❌ 索引文件未生成"
            exit 1
          fi
          echo "✅ 索引生成成功"
          ls -lh docs-index.json

      - name: Prepare Skill package
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        id: version
        run: |
          set -e
          
          # 创建发布目录
          rm -rf release release-lite
          mkdir -p release
          
          # 复制必要文件
          cp -r scripts release/
          cp SKILL.md README.md DISTRIBUTION.md QUICKSTART.md GITHUB_ACTIONS_SETUP.md release/ 2>/dev/null || true
          cp docs-index.json release/
          
          # 复制清洗后的文档（离线版）
          cp -r docs-cache release/docs
          
          # 生成版本号
          SHORT_SHA=$(echo "${{ steps.check.outputs.upstream_sha }}" | cut -c1-7)
          VERSION=$(date +%Y%m%d)-${SHORT_SHA}
          echo "version=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 版本号: ${VERSION}"

      - name: Build offline package
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          cd release
          tar -czf ../openclaw-docs-offline-${VERSION}.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            .
          cd ..
          ls -lh openclaw-docs-offline-*.tar.gz

      - name: Build lite package
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          mkdir -p release-lite
          cp -r release/scripts release-lite/
          cp release/SKILL.md release/README.md release/DISTRIBUTION.md release/QUICKSTART.md release/GITHUB_ACTIONS_SETUP.md release-lite/ 2>/dev/null || true
          cp release/docs-index.json release-lite/
          
          cd release-lite
          tar -czf ../openclaw-docs-lite-${VERSION}.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            .
          cd ..
          ls -lh openclaw-docs-lite-*.tar.gz

      - name: Upload artifacts
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skill-packages
          path: |
            openclaw-docs-offline-*.tar.gz
            openclaw-docs-lite-*.tar.gz
          retention-days: 30

      - name: Create Release
        if: |
          (steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true') &&
          github.event.inputs.skip_release != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenClaw Docs ${{ steps.version.outputs.version }}
          body: |
            ## 📚 OpenClaw 文档同步更新
            
            **同步来源**: [openclaw/openclaw@${{ steps.check.outputs.upstream_sha }}](https://github.com/openclaw/openclaw/commit/${{ steps.check.outputs.upstream_sha }})
            
            **更新时间**: ${{ steps.check.outputs.upstream_date }}
            
            ### 📦 包含内容
            - ✅ 仅英文文档（已过滤 zh-CN, ja-JP 等）
            - ✅ 内容清洗（移除 HTML 注释等）
            - ✅ 完整索引（支持快速搜索）
            
            ### 📥 下载
            
            | 版本 | 大小 | 说明 |
            |------|------|------|
            | `openclaw-docs-offline-*.tar.gz` | ~8MB | 离线版，开箱即用 |
            | `openclaw-docs-lite-*.tar.gz` | ~200KB | 轻量版，首次使用自动下载 |
            
            ### 🚀 快速开始
            
            ```bash
            # 离线版
            tar -xzf openclaw-docs-offline-*.tar.gz
            cd openclaw-docs
            python scripts/search-docs.py "multi-agent"
            
            # 轻量版
            tar -xzf openclaw-docs-lite-*.tar.gz
            cd openclaw-docs
            python scripts/setup.py  # 自动拉取文档
            ```
          files: |
            openclaw-docs-offline-*.tar.gz
            openclaw-docs-lite-*.tar.gz

      - name: Save sync state
        if: steps.check.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
        run: |
          set -e
          echo "${{ steps.check.outputs.upstream_sha }}" > .last-sync-commit
          echo "${{ steps.check.outputs.upstream_date }}" > .last-sync-date
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .last-sync-commit .last-sync-date
          
          SHORT_SHA=$(echo "${{ steps.check.outputs.upstream_sha }}" | cut -c1-7)
          git diff --cached --quiet || git commit -m "docs: sync to ${SHORT_SHA}"
          git push

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ 构建成功！"
          else
            echo "❌ 构建失败"
          fi
